[build]
  command = "bun run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_USE_NETLIFY_EDGE = "true"

# Next.js runtime plugin (handles SSR, image optimization, API routes)
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Cache Next.js builds between deploys for faster CI
[[build.cache]]
  paths = ["node_modules", ".next/cache"]

# Security & cache headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirect legacy project slugs (from the old sprucerva.com IA) to portfolio
# e.g. /palmyra -> /#portfolio
[[redirects]]
  from = "/palmyra"
  to = "/#portfolio"
  status = 302

[[redirects]]
  from = "/south"
  to = "/#portfolio"
  status = 302

